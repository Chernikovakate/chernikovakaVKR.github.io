<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Итог проверки</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fc;
      color: #173f6f;
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #114d91;
    }
    .card {
      padding: 20px;
      border-radius: 16px;
      background: #f3f7ff;
      margin-top: 20px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #dbe4f0;
    }
    .row:last-child {
      border-bottom: none;
    }
    .label {
      font-weight: 700;
    }
    .value {
      text-align: right;
    }
    .risk-low { color: #1f8a3b; font-weight: 700; }
    .risk-medium { color: #c97a00; font-weight: 700; }
    .risk-high { color: #c40000; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Итог проверки</h1>

    <div class="card">
      <div class="row">
        <div class="label">Организация</div>
        <div class="value" id="orgName">Без названия</div>
      </div>
      <div class="row">
        <div class="label">Интегральный показатель</div>
        <div class="value" id="score">—</div>
      </div>
      <div class="row">
        <div class="label">Уровень риска</div>
        <div class="value" id="risk">—</div>
      </div>
    </div>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem('resultData') || '{}');

    document.getElementById('orgName').textContent = data.orgName || 'Без названия';
    document.getElementById('opf').textContent = data.opf || '—';
    document.getElementById('score').textContent = data.score ?? '—';

    const riskEl = document.getElementById('risk');
    const risk = data.risk || '—';
    riskEl.textContent = risk;

    if (risk.toLowerCase().includes('низк')) riskEl.className = 'value risk-low';
    else if (risk.toLowerCase().includes('сред')) riskEl.className = 'value risk-medium';
    else if (risk.toLowerCase().includes('выс')) riskEl.className = 'value risk-high';
  </script>
</body>
</html>
