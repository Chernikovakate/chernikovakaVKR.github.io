<script>
function readBlock(key){
  try {
    return JSON.parse(localStorage.getItem(key)) || { score: 0 };
  } catch(e){
    return { score: 0 };
  }
}

const b1 = readBlock('b_id');
const b2 = readBlock('b_oper');
const b3 = readBlock('b_external');
const b4 = readBlock('b_fin');

const total = (b1.score || 0) + (b2.score || 0) + (b3.score || 0) + (b4.score || 0);

document.getElementById('r1').textContent = (b1.score || 0).toFixed(3);
document.getElementById('r2').textContent = (b2.score || 0).toFixed(3);
document.getElementById('r3').textContent = (b3.score || 0).toFixed(3);
document.getElementById('r4').textContent = (b4.score || 0).toFixed(3);
document.getElementById('total').textContent = total.toFixed(3);
</script>
